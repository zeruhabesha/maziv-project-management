services:
  - type: web
    name: maziv-backend
    env: node
    build:
      command: "npm install"
      publish: "/server"
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: maziv-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
    plan: free
    numInstances: 1
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: maziv-db
    databaseName: maziv_production
    user: maziv_user
    plan: free
    deleteProtection: false
