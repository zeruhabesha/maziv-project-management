services:
  - type: web
    name: maziv-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: "/usr/src/app/start.sh"
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_OPTIONS
        value: "--experimental-modules --es-module-specifier-resolution=node"
    plan: free
    numInstances: 1
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: maziv-db
    databaseName: maziv_production
    user: maziv_user
    plan: free
    deleteProtection: false
