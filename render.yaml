services:
  - type: web
    name: maziv-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: NODE_OPTIONS
        value: "--experimental-modules --es-module-specifier-resolution=node"
      - key: NODE_VERSION
        value: 20.x
    plan: free
    numInstances: 1
    healthCheckPath: /api/health
    autoDeploy: true
    buildCommand: |
      echo "Building with Node.js 20..."
      npm install -g npm@latest
      cd server && npm install

databases:
  - name: maziv-db
    databaseName: maziv_production
    user: maziv_user
    plan: free
    deleteProtection: false
