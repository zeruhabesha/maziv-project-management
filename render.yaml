services:
  - type: web
    name: maziv-backend
    env: node
    buildCommand: |
      cd server && chmod +x start.sh && npm install
    startCommand: ./server/start.sh
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: NPM_VERSION
        value: latest
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    plan: free
    numInstances: 1
    healthCheckPath: /api/health
    autoDeploy: true

databases:
  - name: maziv-db
    databaseName: maziv_production
    user: maziv_user
    plan: free
    deleteProtection: false
